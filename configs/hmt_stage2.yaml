# Stage 2: dynamic per-layer rank via energy-based scheduler + randomized SVD
# Compares against Stage 1 (fixed rank=64) — should produce avg rank < 64 on
# layers with concentrated spectra while keeping loss within 1% of Stage 1.

baseline: adamw   # model loader: full-precision BF16

model:
  name: EleutherAI/pythia-160m
  dtype: bfloat16
  gradient_checkpointing: false

data:
  dataset: wikitext
  subset: wikitext-2-raw-v1
  split: train
  text_field: text
  seq_length: 1024
  streaming: true
  shuffle_buffer: 1000
  seed: 42

training:
  optimizer: lowrank_adamw
  learning_rate: 2.0e-5
  weight_decay: 0.01
  betas: [0.9, 0.95]
  eps: 1.0e-8
  max_grad_norm: 1.0
  batch_size: 1
  gradient_accumulation_steps: 8
  max_steps: 200
  warmup_steps: 20
  lr_schedule: cosine
  lowrank:
    mode: two_sided
    method: randomized        # full | randomized — Stage 2.1 randomized SVD
    basis_update_interval: 50
    rank_scheduler:           # Stage 2.2: per-layer energy-based rank
      candidates: [32, 64, 128, 256]
      threshold: 0.95
    target_pattern: "attention\\.(query_key_value|dense)|mlp\\.(dense_h_to_4h|dense_4h_to_h)"

eval:
  split: validation
  interval: 50
  max_batches: 50

logging:
  log_interval: 10
  output_dir: ./outputs/hmt_stage2
